# Postgres test instance for integration tests.
# Usage:
#   docker compose -f docker-compose.test.yml up -d --wait
#   HOOKAIDO_TEST_POSTGRES_DSN="postgres://hookaido_test:hookaido_test@localhost:5433/hookaido_test?sslmode=disable" make test-pg
#   docker compose -f docker-compose.test.yml down
#
# Note: integration tests across multiple packages share this single database,
# so test execution must be serialized with `go test -p 1` (the test-pg target
# does this). Running `go test ./...` in parallel against this DSN will cause
# spurious failures from cross-package interference.

services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: hookaido_test
      POSTGRES_PASSWORD: hookaido_test
      POSTGRES_DB: hookaido_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hookaido_test"]
      interval: 2s
      timeout: 5s
      retries: 10
